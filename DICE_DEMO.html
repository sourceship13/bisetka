<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nardi Dice Animation Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .instruction {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 12px;
            border: 3px solid #333;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .dice:active {
            transform: scale(0.95);
        }

        .dice-area {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            padding: 40px;
            cursor: pointer;
            user-select: none;
            perspective: 1000px;
        }

        .rolling {
            animation: roll3d 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes roll3d {
            0% {
                transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1) translateY(0);
            }
            25% {
                transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg) scale(1.2) translateY(-40px);
            }
            50% {
                transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg) scale(1.2) translateY(-60px);
            }
            75% {
                transform: rotateX(1080deg) rotateY(540deg) rotateZ(270deg) scale(1.1) translateY(-30px);
            }
            100% {
                transform: rotateX(1440deg) rotateY(720deg) rotateZ(360deg) scale(1) translateY(0);
            }
        }

        .dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
        }

        /* Dot positions */
        .dot-1 { top: 34px; left: 34px; } /* center */
        .dot-2 { top: 15px; left: 15px; } /* top-left */
        .dot-3 { bottom: 15px; right: 15px; } /* bottom-right */
        .dot-4 { top: 15px; right: 15px; } /* top-right */
        .dot-5 { bottom: 15px; left: 15px; } /* bottom-left */
        .dot-6 { top: 34px; left: 15px; } /* middle-left */
        .dot-7 { top: 34px; right: 15px; } /* middle-right */

        .result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
        }

        .click-hint {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Nardi Dice Animation 🎲</h1>
        <p class="instruction">Click or tap the dice to roll!</p>
        
        <div class="dice-area" onclick="rollDice()">
            <div class="dice" id="dice1"></div>
            <div class="dice" id="dice2"></div>
        </div>

        <div class="result" id="result"></div>
        <p class="click-hint">In the app: Swipe the dice to roll</p>
    </div>

    <script>
        let isRolling = false;

        function getDiceDots(value) {
            const dots = [];
            
            // Center dot (1, 3, 5)
            if (value === 1 || value === 3 || value === 5) {
                dots.push(1);
            }

            // Top-left and bottom-right (2, 3, 4, 5, 6)
            if (value >= 2) {
                dots.push(2, 3);
            }

            // Top-right and bottom-left (4, 5, 6)
            if (value >= 4) {
                dots.push(4, 5);
            }

            // Middle-left and middle-right (6)
            if (value === 6) {
                dots.push(6, 7);
            }

            return dots;
        }

        function renderDice(diceElement, value) {
            diceElement.innerHTML = '';
            const dots = getDiceDots(value);
            
            dots.forEach(dotNum => {
                const dot = document.createElement('div');
                dot.className = `dot dot-${dotNum}`;
                diceElement.appendChild(dot);
            });
        }

        function rollDice() {
            if (isRolling) return;
            
            isRolling = true;
            const dice1 = document.getElementById('dice1');
            const dice2 = document.getElementById('dice2');
            const result = document.getElementById('result');
            
            // Add rolling animation
            dice1.classList.add('rolling');
            dice2.classList.add('rolling');
            
            // Randomize during animation
            const interval = setInterval(() => {
                renderDice(dice1, Math.floor(Math.random() * 6) + 1);
                renderDice(dice2, Math.floor(Math.random() * 6) + 1);
            }, 60);
            
            // Stop after animation
            setTimeout(() => {
                clearInterval(interval);
                
                const finalDice1 = Math.floor(Math.random() * 6) + 1;
                const finalDice2 = Math.floor(Math.random() * 6) + 1;
                
                renderDice(dice1, finalDice1);
                renderDice(dice2, finalDice2);
                
                dice1.classList.remove('rolling');
                dice2.classList.remove('rolling');
                
                result.textContent = `You rolled: ${finalDice1} + ${finalDice2} = ${finalDice1 + finalDice2}`;
                
                isRolling = false;
            }, 800);
        }

        // Initialize with random values
        renderDice(document.getElementById('dice1'), 6);
        renderDice(document.getElementById('dice2'), 6);
    </script>
</body>
</html>
