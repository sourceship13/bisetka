apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Provide react-native path so libraries can skip the `node` exec call
ext {
    REACT_NATIVE_NODE_MODULES_DIR = new File("${rootProject.projectDir}/../node_modules/react-native").canonicalPath
}

react {
    // Autolinks all native libraries as implementation project(:...) dependencies
    autolinkLibrariesWithApp()
}

android {
    namespace "com.sera.dev.bisetka"
    compileSdk 36

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.sera.dev.bisetka"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst "**/libc++_shared.so"
        pickFirst "**/libfbjni.so"
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}

repositories {
    mavenCentral()
    google()
    maven { url 'https://www.jitpack.io' }
}
