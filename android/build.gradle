buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.0")
    }
}

// Set REACT_NATIVE_NODE_MODULES_DIR so libraries skip the `node` exec fallback
ext {
    REACT_NATIVE_NODE_MODULES_DIR = new File("${rootProject.projectDir}/../node_modules/react-native").canonicalPath
}

// Add Mapbox Maven registry (auth no longer required) to all projects
allprojects {
    repositories {
        maven {
            url 'https://api.mapbox.com/downloads/v2/releases/maven'
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
