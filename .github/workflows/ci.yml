# GitHub Actions workflow
# Builds React Native production for both Android and iOS (TestFlight)
# Triggers only on main branch (production releases)
# Frontend: /no.limit.bisetka/bisetka

name: Bisetka CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_ios:
    name: Build iOS & Deploy
    runs-on: macos-15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Select Xcode 26
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure GitHub Packages registry
        run: |
          echo "@sourceship13:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install Bundler dependencies
        run: bundle install
      - name: Cache CocoaPods specs and Pods
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: |
            ~/.cocoapods
            ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      - name: Install CocoaPods
        if: steps.pods-cache.outputs.cache-hit != 'true'
        run: |
          cd ios
          pod install
      - name: Create App Store Connect API Key
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_KEY_CONTENT }}
        run: |
          mkdir -p ios/fastlane
          cd ios/fastlane
          # Use jq to properly create JSON with escaped content
          jq -n \
            --arg key_id "$APP_STORE_API_KEY_ID" \
            --arg issuer_id "$APP_STORE_ISSUER_ID" \
            --arg key "$APP_STORE_API_KEY_CONTENT" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key}' > api_key.json
      - name: Pre-bundle React Native JS (warms Metro cache, no Watchman)
        run: |
          npx react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output /tmp/main.jsbundle \
            --assets-dest /tmp/rn-assets
      - name: Build and Deploy iOS with Fastlane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
        run: |
          # Write .xcode.env.local so Xcode's "Bundle React Native code and images"
          # script can find node (actions/setup-node puts it in a non-standard path
          # that command -v node misses inside Xcode's restricted build environment).
          NODE_PATH=$(which node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          echo "NODE_BINARY set to: $NODE_PATH"
          cd ios
          bundle exec fastlane production
      - name: Upload build logs on failure
        if: failure()
        run: |
          echo "=== GYM LOG LOCATION ==="
          find ~/Library/Logs/gym -name "*.log" 2>/dev/null | head -10
          GYM_LOG=$(find ~/Library/Logs/gym -name "bisetka-bisetka.log" 2>/dev/null | head -1)
          if [ -z "$GYM_LOG" ]; then
            GYM_LOG=$(find ~/Library/Logs/gym -name "*.log" 2>/dev/null | head -1)
          fi
          echo "Using log: $GYM_LOG"
          echo ""
          echo "=== COMPILE ERRORS (error:) ==="
          if [ -n "$GYM_LOG" ]; then
            grep -n " error:" "$GYM_LOG" 2>/dev/null | grep -v "^[0-9]*:.*warning:" | tail -100
          fi
          echo ""
          echo "=== ARCHIVE FAILURE CONTEXT ==="
          if [ -n "$GYM_LOG" ]; then
            grep -B5 -A10 "ARCHIVE FAILED\|BUILD FAILED\|CompileSwift\|CompileC\|Ld " "$GYM_LOG" 2>/dev/null | grep -A10 "error:" | tail -120
          fi
          echo ""
          echo "=== LAST 150 LINES OF LOG ==="
          if [ -n "$GYM_LOG" ]; then
            tail -150 "$GYM_LOG"
          fi
