# GitHub Actions workflow ported from CircleCI
# Builds React Native staging for both Android (internal testing) and iOS (TestFlight)
# Frontend: /no.limit.bisetka/bisetka

name: CI & Deploy Staging

on:
  push:
    branches:
      - staging
      - main
      - develop
  pull_request:
    branches:
      - staging
      - main
      - develop

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: |
          if grep -q '"test"' package.json; then
            npm run test -- --ci --coverage --maxWorkers=2 || echo "Tests not configured or failed"
          else
            echo "No tests configured"
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  build_android:
    name: Build Android & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Bundler dependencies
        run: bundle install
      - name: Build and Deploy Android with Fastlane
        env:
          GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY_DATA }}
        run: |
          cd android
          bundle exec fastlane staging

  build_ios:
    name: Build iOS & Deploy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install Bundler dependencies
        run: bundle install
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
      - name: Import Code Signing Certificates
        if: env.CERTIFICATES_P12 != ''
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
        run: |
          # Create keychain
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          # Import certificate
          echo "$CERTIFICATES_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12
      - name: Create App Store Connect API Key
        if: env.APP_STORE_API_KEY_ID != ''
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_KEY_CONTENT }}
        run: |
          cd ios/fastlane
          cat > api_key.json << EOF
          {
            "key_id": "$APP_STORE_API_KEY_ID",
            "issuer_id": "$APP_STORE_ISSUER_ID",
            "key": "$APP_STORE_API_KEY_CONTENT"
          }
          EOF
      - name: Build and Deploy iOS with Fastlane
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
        run: |
          cd ios
          bundle exec fastlane staging
