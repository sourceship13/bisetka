# GitHub Actions workflow
# Builds React Native production for both Android and iOS (TestFlight)
# Triggers only on main branch (production releases)
# Frontend: /no.limit.bisetka/bisetka

name: Bisetka CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_ios:
    name: Build iOS & Deploy
    runs-on: macos-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure GitHub Packages registry
        run: |
          echo "@sourceship13:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install Bundler dependencies
        run: bundle install
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
      - name: Create App Store Connect API Key
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_KEY_CONTENT }}
        run: |
          mkdir -p ios/fastlane
          cd ios/fastlane
          # Use jq to properly create JSON with escaped content
          jq -n \
            --arg key_id "$APP_STORE_API_KEY_ID" \
            --arg issuer_id "$APP_STORE_ISSUER_ID" \
            --arg key "$APP_STORE_API_KEY_CONTENT" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key}' > api_key.json
      - name: Pre-warm Watchman for Metro bundler
        run: |
          watchman watch $GITHUB_WORKSPACE || true
          watchman watch-project $GITHUB_WORKSPACE || true
      - name: Build and Deploy iOS with Fastlane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
        run: |
          cd ios
          bundle exec fastlane production
      - name: Upload build logs on failure
        if: failure()
        run: |
          GYM_LOG=$(find ~/Library/Logs/gym -name "bisetka-bisetka.log" 2>/dev/null | head -1)
          echo "=== ERRORS FROM GYM LOG ==="
          if [ -n "$GYM_LOG" ]; then
            grep -n "error:" "$GYM_LOG" 2>/dev/null | grep -v "^Binary\|\.h:\|warning:" | tail -80
          else
            echo "gym log not found at expected path"
            find ~/Library/Logs/gym -name "*.log" 2>/dev/null
          fi
          echo ""
          echo "=== LAST 100 LINES OF GYM LOG ==="
          if [ -n "$GYM_LOG" ]; then
            tail -100 "$GYM_LOG"
          fi
          echo ""
          echo "=== SCRIPT PHASE FAILURES ==="
          if [ -n "$GYM_LOG" ]; then
            grep -A 20 "PhaseScriptExecution\|Script Phase\|** ARCHIVE FAILED" "$GYM_LOG" 2>/dev/null | tail -60
          fi
