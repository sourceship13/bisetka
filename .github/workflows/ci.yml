# GitHub Actions workflow ported from CircleCI
# Builds React Native staging for both Android (internal testing) and iOS (TestFlight)
# Frontend: /no.limit.bisetka/bisetka

name: Bisetka CI & Deploy

on:
  push:
    branches:
      - staging
      - main
      - develop
  pull_request:
    branches:
      - staging
      - main
      - develop

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: |
          if grep -q '"test"' package.json; then
            npm run test -- --ci --coverage --maxWorkers=2 || echo "Tests not configured or failed"
          else
            echo "No tests configured"
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  build_android:
    name: Build Android & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Bundler dependencies
        run: bundle install
      - name: Build and Deploy Android with Fastlane
        env:
          GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY_DATA }}
        run: |
          cd android
          bundle exec fastlane staging

  build_ios:
    name: Build iOS & Deploy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install Bundler dependencies
        run: bundle install
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
      - name: Create App Store Connect API Key
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_KEY_CONTENT }}
        run: |
          mkdir -p ios/fastlane
          cd ios/fastlane
          # Use jq to properly create JSON with escaped content
          jq -n \
            --arg key_id "$APP_STORE_API_KEY_ID" \
            --arg issuer_id "$APP_STORE_ISSUER_ID" \
            --arg key "$APP_STORE_API_KEY_CONTENT" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key}' > api_key.json
      - name: Build and Deploy iOS with Fastlane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
        run: |
          cd ios
          bundle exec fastlane staging
