name: Android Release Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build-android-artifacts:
    name: Build Staging And Production Android Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      LANG: en_US.UTF-8
      NODE_ENV: development
      JAVA_OPTS: -Xms512m -Xmx4g
      GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx3g -XX:+HeapDumpOnOutOfMemoryError"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure npm authentication
        env:
          FRIBEE_NPM_TOKEN: ${{ secrets.FRIBEE_NPM_TOKEN }}
        run: |
          if [ -n "$FRIBEE_NPM_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=${FRIBEE_NPM_TOKEN}" > ~/.npmrc
            echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          fi

      - name: Install Node.js dependencies
        run: npm ci

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install CMake
        run: echo "y" | sdkmanager "cmake;3.22.1"

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is required"
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/bisetka-release.keystore

      - name: Decode Android environment files
        env:
          ENV_STAGING_BASE64: ${{ secrets.ENV_STAGING_BASE64 }}
          ENV_PRODUCTION_BASE64: ${{ secrets.ENV_PRODUCTION_BASE64 }}
        run: |
          if [ -z "$ENV_STAGING_BASE64" ]; then
            echo "ENV_STAGING_BASE64 is required"
            exit 1
          fi

          if [ -z "$ENV_PRODUCTION_BASE64" ]; then
            echo "ENV_PRODUCTION_BASE64 is required"
            exit 1
          fi

          echo "$ENV_STAGING_BASE64" | base64 --decode > .env.staging
          echo "$ENV_PRODUCTION_BASE64" | base64 --decode > .env.production

      - name: Prepare React Native codegen inputs
        run: |
          mkdir -p node_modules/react-native-config/android/build/generated/source/codegen/jni
          chmod +x android/gradlew

      - name: Build staging release artifacts
        env:
          CI: 'true'
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          ENVFILE: .env.staging
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/bisetka-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cp .env.staging .env
          cd android
          ./gradlew generateCodegenArtifactsFromSchema --no-daemon
          ./gradlew clean assembleStagingRelease bundleStagingRelease --no-daemon --stacktrace

      - name: Build production release artifacts
        env:
          CI: 'true'
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          ENVFILE: .env.production
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/bisetka-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cp .env.production .env
          cd android
          ./gradlew assembleProductionRelease bundleProductionRelease --no-daemon --stacktrace

      - name: Upload staging APK
        uses: actions/upload-artifact@v4
        with:
          name: app-staging-release-apk
          path: android/app/build/outputs/apk/staging/release/app-staging-release.apk
          if-no-files-found: error

      - name: Upload staging AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-staging-release-aab
          path: android/app/build/outputs/bundle/stagingRelease/app-staging-release.aab
          if-no-files-found: error

      - name: Upload production APK
        uses: actions/upload-artifact@v4
        with:
          name: app-production-release-apk
          path: android/app/build/outputs/apk/production/release/app-production-release.apk
          if-no-files-found: error

      - name: Upload production AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-production-release-aab
          path: android/app/build/outputs/bundle/productionRelease/app-production-release.aab
          if-no-files-found: error